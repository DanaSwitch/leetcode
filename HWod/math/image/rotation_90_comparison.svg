  <!-- 左图：顺时针 -->
  <!-- 原向量 (0,0)→(100,0) 即 dx=100,dy=0 -->
  <!-- 顺时针旋转: (dy,-dx)=(0,-100) 即向下... 不对，坐标系y向下 -->
  <!-- 屏幕坐标系: y向下。顺时针旋转90°: (dx,dy)→(dy,-dx) -->
  <!-- 原向量向右(100,0), 顺时针→(0,-100) 即向上 (屏幕y轴向下，所以-100是向上) -->
  <!-- 实际上在屏幕坐标下顺时针: (dx,dy)→(-dy,dx) -->
  <!-- 数学坐标顺时针=(dy,-dx), 屏幕坐标顺时针=(-dy,dx) -->
  <!-- 让我用直觉画: 原向量向右，顺时针转90度应该向下 -->
  
  <!-- 左图中心 (170, 190) -->
  <!-- 原向量: 向右 (170,190)→(270,190), dx=100,dy=0 -->
  <!-- 顺时针90°(屏幕坐标): (dx,dy)→(-dy,dx) = (0,100) 即向下 -->
  <!-- 所以旋转后向量: (170,190)→(170,290) -->

  <text x="170" y="38" text-anchor="middle" style="fill:rgb(20, 20, 19);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:14px;font-weight:500;text-anchor:middle;dominant-baseline:auto">顺时针旋转 90°</text>

